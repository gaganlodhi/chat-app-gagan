<script>
var socket = io();

// 👇 username ek baar hi lo
var currentUser = prompt("Enter your name");

function sendMessage() {
    var message = document.getElementById("message").value;

    socket.send({
        username: currentUser,
        message: message
    });
}

socket.on('message', function(data) {
    var li = document.createElement("li");
    li.classList.add("message");

    // 👇 debug ke liye (optional)
    console.log("Me:", currentUser);
    console.log("Msg from:", data.username);

    if (data.username.trim() === currentUser.trim()) {
        li.classList.add("sent");
    } else {
        li.classList.add("received");
    }

    li.innerText = data.username + ": " + data.message;

    document.getElementById("messages").appendChild(li);
});
</script>
